kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1
metadata:
  name: luxeaccessories.fashion.com
spec:
  group: fashion.com
  names: 
    kind: LuxeAccessory
    plural: luxeaccessories
    singular: luxeaccessory 
    shortNames:
      - lux
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string   # e.g. handbag, jewelry, watch
                brand:
                  type: string
                price:
                  type: number
                color:
                  type: string
                inStock:
                  type: boolean



